name: 抽選データ自動更新

on:
  # 毎週 火・木・金・土 の日本時間21:00頃(UTC 12:00)に実行
  # ロト6(月木)・ロト7(金)・ミニロト(火)・ビンゴ5(月)・ナンバーズ(平日毎日)の
  # 開催日をだいたいカバーするタイミング
  schedule:
    - cron: '0 12 * * 1,2,3,4,5'
  # 手動実行ボタン(Actionsタブから「Run workflow」でいつでも実行可能)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: 最新データを取得して更新
        id: update
        run: python scripts/update_data.py

      - name: 変更があればコミット&プッシュ
        run: |
          git config user.name "kujilab-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/*.json
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: 抽選データ自動更新 ($(date -u +'%Y-%m-%d'))"
            git push
          fi
